<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rolex Luxury</title>
    <link rel="stylesheet" href="Web_final.css">
</head>
<body>

    <header>
        <h1>Rolex Luxury</h1>
        <div class="cart-icon">
            🛒 Cart <span id="cart-count">0</span>
        </div>
    </header>

    <main>
        <section id="product-list" class="product-container">
            <!-- Products will be injected here -->
        </section>

        <aside id="shopping-cart" class="cart-section">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items">
                <p class="empty-msg">Your cart is empty.</p>
            </div>
    
            
            <div id="cart-summary" class="hidden">
                <hr>
                <p><strong>Total: $<span id="cart-total">0.00</span></strong></p>
                <button id="clear-cart" onclick="clearCart()">Clear Cart</button>
                <button id="checkout-btn" onclick="checkout()">Checkout</button>
            </div>
        </aside>
    </main>

    <script src="Web_final.js"></script>
</body>
</html>
